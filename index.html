<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoL Champion Relationships</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="search-container">
        <input id="search" type="text" placeholder="Search champion..." autocomplete="off">
      </div>
      <div id="filters">
        <div class="section-label">Relationship type</div>
        <div id="filter-chips"></div>
      </div>
      <div id="communities-section">
        <div class="section-label">Detected communities</div>
        <div id="community-list"></div>
      </div>
      <div id="legend-section">
        <div class="section-label">Color = Region</div>
        <div id="region-legend"></div>
      </div>
    </aside>
    <main id="graph-container">
      <div id="error-message" style="display:none"></div>
      <svg id="graph"></svg>
    </main>
  </div>

  <div id="tooltip"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="js/jlouvain.js"></script>
  <script src="js/community.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/graph.js"></script>
</body>
</html>
